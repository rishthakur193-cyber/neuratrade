steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/neuratrade', '.']

- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/neuratrade']

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - run
  - deploy
  - neuratrade
  - --image
  - gcr.io/$PROJECT_ID/neuratrade
  - --region
  - us-central1
  - --platform
  - managed
  - --allow-unauthenticated

options:
  logging: CLOUD_LOGGING_ONLY
